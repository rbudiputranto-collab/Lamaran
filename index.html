<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Sambutan Lamaran &middot; Cue Card</title>
<meta name="theme-color" content="#1c0e17">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-1:#1c0e17;
    --bg-2:#341826;
    --card-top:#3a1c29;
    --card-bot:#22101a;
    --ink:#f7eedd;
    --ink-dim:#cdb9a6;
    --gold:#cda24e;
    --gold-dim:#8a6f3c;
    --gold-soft:rgba(205,162,78,0.35);
    --direction:#a98f66;
    --safe-t:env(safe-area-inset-top,0px);
    --safe-b:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    height:100%;
    margin:0;
    overflow:hidden;
    background:var(--bg-1);
  }
  body{
    font-family:'Manrope',sans-serif;
    color:var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(120% 90% at 50% -10%, var(--bg-2) 0%, var(--bg-1) 55%),
      var(--bg-1);
    position:relative;
  }
  /* faint kawung-inspired dot texture */
  body::before{
    content:"";
    position:absolute; inset:0;
    background-image:
      radial-gradient(circle at 20% 30%, var(--gold-soft) 0, transparent 1.2px),
      radial-gradient(circle at 60% 70%, var(--gold-soft) 0, transparent 1.2px),
      radial-gradient(circle at 80% 20%, var(--gold-soft) 0, transparent 1.2px),
      radial-gradient(circle at 35% 85%, var(--gold-soft) 0, transparent 1.2px);
    background-size: 140px 140px;
    opacity:.18;
    pointer-events:none;
  }

  .app{
    width:100%;
    max-width:480px;
    height:100%;
    max-height:900px;
    padding: calc(18px + var(--safe-t)) 18px calc(16px + var(--safe-b));
    display:flex;
    flex-direction:column;
    position:relative;
    z-index:1;
  }

  /* ---------- top bar ---------- */
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:14px;
    flex-shrink:0;
  }
  .topbar .title{
    font-family:'Cormorant Garamond',serif;
    font-weight:600;
    font-style:italic;
    font-size:15px;
    color:var(--gold);
    letter-spacing:.02em;
  }
  .topbar .counter{
    font-size:11px;
    letter-spacing:.14em;
    color:var(--ink-dim);
    font-variant-numeric:tabular-nums;
  }

  .progress{
    display:flex;
    gap:5px;
    margin-bottom:22px;
    flex-shrink:0;
  }
  .progress i{
    flex:1;
    height:2.5px;
    background:rgba(205,162,78,0.22);
    border-radius:2px;
    overflow:hidden;
    position:relative;
  }
  .progress i span{
    position:absolute; inset:0;
    background:var(--gold);
    transform:scaleX(0);
    transform-origin:left;
    transition:transform .35s ease;
  }
  .progress i.done span{transform:scaleX(1);}

  /* ---------- stage / card ---------- */
  .stage{
    flex:1;
    position:relative;
    perspective:1400px;
    min-height:0;
  }
  .card{
    position:absolute; inset:0;
    border-radius:18px;
    background:
      linear-gradient(165deg, var(--card-top), var(--card-bot));
    border:1px solid rgba(205,162,78,0.28);
    box-shadow:
      0 30px 60px -25px rgba(0,0,0,.65),
      0 0 0 1px rgba(0,0,0,.2) inset;
    padding:30px 26px 26px;
    display:flex;
    flex-direction:column;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    transition:transform .38s cubic-bezier(.22,.68,.32,1), opacity .32s ease;
    will-change:transform,opacity;
  }
  .card::-webkit-scrollbar{width:0;height:0;}

  /* binder holes, evoking a physical stack of flip cards */
  .card::before{
    content:"";
    position:absolute;
    top:14px; left:50%;
    width:34px; height:6px;
    margin-left:-17px;
    border-radius:4px;
    background:rgba(0,0,0,.35);
    box-shadow:0 1px 0 rgba(255,255,255,.04);
  }

  .card.enter-next{transform:translateX(38%) rotateY(18deg) scale(.96); opacity:0;}
  .card.enter-prev{transform:translateX(-38%) rotateY(-18deg) scale(.96); opacity:0;}
  .card.leave-next{transform:translateX(-38%) rotateY(-18deg) scale(.96); opacity:0;}
  .card.leave-prev{transform:translateX(38%) rotateY(18deg) scale(.96); opacity:0;}
  .card.active{transform:translateX(0) rotateY(0) scale(1); opacity:1;}

  .eyebrow{
    font-size:11px;
    font-weight:700;
    letter-spacing:.16em;
    color:var(--gold);
    text-transform:uppercase;
    padding-bottom:12px;
    margin-bottom:18px;
    border-bottom:1px solid rgba(205,162,78,0.25);
    flex-shrink:0;
  }

  .content{flex:1;}
  .content p{
    margin:0 0 18px;
    font-size:20px;
    line-height:1.5;
    color:var(--ink);
    font-weight:500;
  }
  .content p.lead{
    font-size:23px;
    font-weight:700;
    color:var(--ink);
  }
  .content p.pantun{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-size:23px;
    line-height:1.45;
    color:#efd9b0;
    margin:0 0 6px;
    font-weight:600;
  }
  .content p.direction{
    font-size:14px;
    font-style:italic;
    color:var(--direction);
    background:rgba(205,162,78,0.08);
    border-left:2px solid var(--gold-dim);
    padding:8px 12px;
    border-radius:4px;
    margin:0 0 18px;
    line-height:1.4;
  }
  .content p:last-child{margin-bottom:0;}

  /* ---------- tap zones ---------- */
  .tapzone{
    position:absolute; top:0; bottom:0; width:32%;
    z-index:5;
  }
  .tapzone.left{left:0;}
  .tapzone.right{right:0;}

  /* ---------- bottom controls ---------- */
  .controls{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top:16px;
    flex-shrink:0;
  }
  .navbtn{
    width:46px; height:46px;
    border-radius:50%;
    border:1px solid rgba(205,162,78,0.35);
    background:rgba(255,255,255,0.03);
    color:var(--gold);
    display:flex; align-items:center; justify-content:center;
    font-size:18px;
    -webkit-user-select:none; user-select:none;
    transition:opacity .2s, transform .15s;
  }
  .navbtn:active{transform:scale(.92);}
  .navbtn[disabled]{opacity:.25; pointer-events:none;}

  .hint{
    font-size:11.5px;
    color:var(--ink-dim);
    letter-spacing:.03em;
    text-align:center;
    opacity:.7;
  }

  .swipehint{
    position:absolute;
    left:50%; bottom:14px;
    transform:translateX(-50%);
    font-size:11px;
    letter-spacing:.08em;
    color:var(--ink-dim);
    opacity:0;
    transition:opacity .6s ease;
    pointer-events:none;
    white-space:nowrap;
  }
  .swipehint.show{opacity:.55;}

  @media (prefers-reduced-motion: reduce){
    .card{transition:opacity .2s ease;}
    .card.enter-next,.card.enter-prev,.card.leave-next,.card.leave-prev{transform:none;}
  }

  /* ---------- splash screen ---------- */
  .splash{
    position:fixed; inset:0;
    z-index:50;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:24px;
    background:
      radial-gradient(120% 90% at 50% -10%, var(--bg-2) 0%, var(--bg-1) 55%),
      var(--bg-1);
    transition:opacity .55s ease, visibility .55s;
  }
  .splash::before{
    content:"";
    position:absolute; inset:16px;
    border:1px solid rgba(205,162,78,0.3);
    border-radius:22px;
    pointer-events:none;
  }
  .splash.hide{
    opacity:0;
    visibility:hidden;
    pointer-events:none;
  }
  .splash-orn{
    font-size:22px;
    color:var(--gold);
    margin-bottom:18px;
    opacity:.9;
  }
  .splash-eyebrow{
    font-size:12px;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--ink-dim);
    margin-bottom:16px;
  }
  .splash-title{
    font-family:'Cormorant Garamond',serif;
    font-weight:600;
    font-style:italic;
    font-size:56px;
    line-height:1.15;
    color:var(--ink);
    margin:0 0 22px;
  }
  .splash-title span{
    color:var(--gold);
    font-size:0.7em;
    padding:0 6px;
  }
  .splash-hint{
    font-size:11.5px;
    letter-spacing:.1em;
    color:var(--ink-dim);
    opacity:.7;
    animation:pulse 2s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:.4;}
    50%{opacity:.85;}
  }
</style>
</head>
<body>

<div class="splash" id="splash">
  <div class="splash-orn">&#10022;</div>
  <div class="splash-eyebrow">Sambutan Penerimaan Lamaran</div>
  <h1 class="splash-title">Riri <span>&amp;</span> Taufik</h1>
  <div class="splash-hint">ketuk untuk mulai</div>
</div>

<div class="app">
  <div class="topbar">
    <div class="title">Sambutan Lamaran</div>
    <div class="counter" id="counter">01 / 08</div>
  </div>

  <div class="progress" id="progress"></div>

  <div class="stage" id="stage">
    <div class="tapzone left" id="zoneLeft" aria-label="Kartu sebelumnya"></div>
    <div class="tapzone right" id="zoneRight" aria-label="Kartu berikutnya"></div>
    <div class="swipehint" id="swipehint">geser atau ketuk tepi layar</div>
  </div>

  <div class="controls">
    <div class="navbtn" id="btnPrev" role="button" aria-label="Sebelumnya">&#8592;</div>
    <div class="hint">ketuk kartu bagian tepi untuk pindah</div>
    <div class="navbtn" id="btnNext" role="button" aria-label="Berikutnya">&#8594;</div>
  </div>
</div>

<script>
/* ============ ISI SAMBUTAN ============
   Ubah teks di bawah ini kapan pun perlu.
   type: 'eyebrow' label kecil di atas kartu (otomatis dari field label)
         'lead'      kalimat pembuka/penutup tebal
         'p'         paragraf biasa
         'pantun'    baris pantun (italic serif)
         'direction' catatan panggung / improvisasi (tidak selalu dibaca apa adanya)
*/
const CARDS = [
  {
    label: "Kartu 1 · Pembuka",
    blocks: [
      { type:'lead', text:"Assalamu'alaikum warahmatullahi wabarakatuh." },
      { type:'pantun', text:"Burung Nuri hinggap di dahan," },
      { type:'pantun', text:"bernyanyi merdu di pagi hari." },
      { type:'pantun', text:"Rumah kami jadi lebih ramai dan terang," },
      { type:'pantun', text:"karena kedatangan keluarga Bapak kemari." },
    ]
  },
  {
    label: "Kartu 2 · Puji Syukur",
    blocks: [
      { type:'p', text:"Alhamdulillah, puji syukur kita panjatkan kehadirat Allah SWT atas nikmat dan karunia-Nya, sehingga pada hari yang berbahagia ini kita dapat bertatap muka dan bersilaturahmi dalam keadaan sehat wal'afiat." },
      { type:'p', text:"Sholawat serta salam semoga senantiasa tercurah kepada junjungan kita, Nabi Muhammad SAW." },
    ]
  },
  {
    label: "Kartu 3 · Sapaan",
    blocks: [
      { type:'lead', text:"Yang saya hormati Bapak Tabroni dan Ibu Maswati, selaku orang tua dari Muhammad Taufik Hidayat, beserta keluarga besar yang hadir pada kesempatan ini." },
    ]
  },
  {
    label: "Kartu 4 · Perkenalan",
    blocks: [
      { type:'p', text:"Perkenankan saya, Radhitya Budiputranto, mewakili keluarga besar Bapak DR. H. R. Budi Sulistiono, M.Si dan Ibu Trinita Hestiana, MM.Pd." },
      { type:'p', text:"Pertama-tama, kami mengucapkan terima kasih yang sebesar-besarnya atas sambutan yang begitu hangat, ramah, dan penuh kekeluargaan ini. Sungguh suatu kehormatan besar bagi kami atas kehadiran serta penerimaan Bapak, Ibu, dan keluarga besar hari ini." },
    ]
  },
  {
    label: "Kartu 5 · Perkenalan Saudara Kandung",
    blocks: [
      { type:'p', text:"Saya sendiri merupakan kakak tertua dari dua adik saya, Riri dan Icha, yang hari ini turut hadir bersama keluarganya masing-masing." },
      { type:'direction', text:"(sebutkan nama keluarga Riri, bila hadir)" },
      { type:'p', text:"Untuk keluarga Icha, atau Alisa Sulistianingrum, hadir bersama suaminya, Bapak Canang Karismantio, beserta kedua putra-putrinya, Wildan dan Nayla." },
      { type:'p', text:"Wildan saat ini sedang menempuh pendidikan di sekolah penerbangan, insya Allah dengan cita-cita menjadi seorang pilot. Mohon doanya juga untuk kelancaran cita-cita Wildan." },
    ]
  },
  {
    label: "Kartu 6 · Perkenalan Keluarga Besar",
    blocks: [
      { type:'p', text:"Perkenankan juga kami memperkenalkan keluarga besar yang turut hadir mendampingi kami pada hari ini." },
      { type:'p', text:"Yang pertama, Bapak H. Adrian Suyono, atau biasa kami sapa Pakde Yon, kakak tertua dari ibu kami." },
      { type:'direction', text:"(improvisasi) — kami rasa semua yang ada di sini pasti pernah merasakan hangatnya dimomong oleh Pakde Yon sejak kecil." },
      { type:'p', text:"Kemudian, Bapak Budi Susilo dan Ibu Nestri, kakak tertua dari ayah kami," },
      { type:'direction', text:"(sebutkan nama putra-putri beliau, bila hadir)" },
      { type:'p', text:"Serta Bapak Subahagia, atau biasa kami sapa Pakde Yaya, kakak keempat dari ibu kami," },
      { type:'direction', text:"(sebutkan nama putra-putri beliau, bila hadir)" },
    ]
  },
  {
    label: "Kartu 7 · Inti Sambutan",
    blocks: [
      { type:'p', text:"Kami telah mendengarkan dengan seksama maksud dan tujuan kedatangan keluarga besar yang telah disampaikan tadi. Dengan penuh rasa syukur dan sukacita, maksud baik tersebut kami terima dengan senang hati." },
      { type:'p', text:"Besar harapan kami, semoga langkah baik ini senantiasa diridhoi Allah SWT dan dimudahkan hingga sampai ke jenjang pernikahan yang sakinah, mawaddah, warahmah. Aamiin ya Rabbal 'Alamin." },
    ]
  },
  {
    label: "Kartu 8 · Penutup",
    blocks: [
      { type:'p', text:"Kurang lebihnya kami mohon maaf. Selanjutnya, proses berikutnya kami serahkan sepenuhnya kepada keluarga besar." },
      { type:'p', text:"Demikian sambutan yang dapat kami sampaikan. Mohon maaf apabila ada tutur kata yang kurang berkenan dalam penyampaian ini." },
      { type:'pantun', text:"Sungai Mahakam airnya bersih," },
      { type:'pantun', text:"tempat orang mencari ikan." },
      { type:'pantun', text:"Cukup sekian dan terima kasih," },
      { type:'pantun', text:"jika ada salah, sudilah dimaafkan." },
      { type:'lead', text:"Wassalamu'alaikum warahmatullahi wabarakatuh." },
    ]
  },
];
/* ======================================= */

const stage = document.getElementById('stage');
const counterEl = document.getElementById('counter');
const progressEl = document.getElementById('progress');
const btnPrev = document.getElementById('btnPrev');
const btnNext = document.getElementById('btnNext');
const zoneLeft = document.getElementById('zoneLeft');
const zoneRight = document.getElementById('zoneRight');
const swipehint = document.getElementById('swipehint');

let current = 0;
const total = CARDS.length;
let animating = false;

function pad(n){ return n < 10 ? '0'+n : ''+n; }

function buildCardEl(index){
  const data = CARDS[index];
  const el = document.createElement('div');
  el.className = 'card';
  const eyebrow = document.createElement('div');
  eyebrow.className = 'eyebrow';
  eyebrow.textContent = data.label;
  el.appendChild(eyebrow);
  const content = document.createElement('div');
  content.className = 'content';
  data.blocks.forEach(b=>{
    const p = document.createElement('p');
    p.className = b.type;
    p.textContent = b.text;
    content.appendChild(p);
  });
  el.appendChild(content);
  return el;
}

function buildProgress(){
  progressEl.innerHTML = '';
  for(let i=0;i<total;i++){
    const i_el = document.createElement('i');
    const span = document.createElement('span');
    i_el.appendChild(span);
    progressEl.appendChild(i_el);
  }
}

function updateProgress(){
  [...progressEl.children].forEach((el,i)=>{
    el.classList.toggle('done', i <= current);
  });
}

function updateChrome(){
  counterEl.textContent = pad(current+1) + ' / ' + pad(total);
  btnPrev.toggleAttribute('disabled', current === 0);
  btnNext.toggleAttribute('disabled', current === total-1);
  updateProgress();
}

function render(dir){
  // dir: 1 = next, -1 = prev, 0 = initial
  const incoming = buildCardEl(current);
  if(dir === 0){
    incoming.classList.add('active');
    stage.appendChild(incoming);
    updateChrome();
    return;
  }
  animating = true;
  const outgoing = stage.querySelector('.card.active');
  incoming.classList.add(dir === 1 ? 'enter-next' : 'enter-prev');
  stage.appendChild(incoming);
  // force reflow
  incoming.getBoundingClientRect();
  requestAnimationFrame(()=>{
    if(outgoing){
      outgoing.classList.remove('active');
      outgoing.classList.add(dir === 1 ? 'leave-next' : 'leave-prev');
    }
    incoming.classList.remove('enter-next','enter-prev');
    incoming.classList.add('active');
  });
  setTimeout(()=>{
    if(outgoing && outgoing.parentNode) outgoing.parentNode.removeChild(outgoing);
    animating = false;
  }, 400);
  updateChrome();
}

function goTo(index, dir){
  if(animating) return;
  if(index < 0 || index > total-1) return;
  current = index;
  render(dir);
}

btnPrev.addEventListener('click', ()=> goTo(current-1, -1));
btnNext.addEventListener('click', ()=> goTo(current+1, 1));
zoneLeft.addEventListener('click', (e)=>{ if(suppressClick) return; goTo(current-1, -1); });
zoneRight.addEventListener('click', (e)=>{ if(suppressClick) return; goTo(current+1, 1); });

document.addEventListener('keydown', (e)=>{
  if(e.key === 'ArrowRight') goTo(current+1, 1);
  if(e.key === 'ArrowLeft') goTo(current-1, -1);
});

// swipe support
let touchStartX = null, touchStartY = null;
let suppressClick = false;
stage.addEventListener('touchstart', (e)=>{
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive:true});

stage.addEventListener('touchend', (e)=>{
  if(touchStartX === null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if(Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy)*1.4){
    suppressClick = true;
    setTimeout(()=> suppressClick = false, 400);
    if(dx < 0) goTo(current+1, 1);
    else goTo(current-1, -1);
  }
  touchStartX = null; touchStartY = null;
}, {passive:true});

// splash screen
const splash = document.getElementById('splash');
function dismissSplash(){
  splash.classList.add('hide');
  splash.removeEventListener('click', dismissSplash);
  document.removeEventListener('keydown', dismissOnKey);
}
function dismissOnKey(){ dismissSplash(); }
splash.addEventListener('click', dismissSplash);
document.addEventListener('keydown', dismissOnKey, { once:true });

// initial render + fade hint
buildProgress();
render(0);
setTimeout(()=> swipehint.classList.add('show'), 500);
setTimeout(()=> swipehint.classList.remove('show'), 3500);
</script>
</body>
</html>
